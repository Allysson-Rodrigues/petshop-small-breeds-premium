name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: petshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d petshop"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/petshop?schema=test
      JWT_SECRET: test-jwt-secret
      CORS_ORIGIN: http://127.0.0.1:4173,http://localhost:4173,http://127.0.0.1:4273,http://localhost:4273

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prepare backend test env
        run: cp apps/backend/.env.test.example apps/backend/.env.test

      - name: Run backend tests
        run: npm run test:backend

  frontend-tests:
    name: Frontend Unit + E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: petshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d petshop"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/petshop?schema=test
      E2E_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/petshop?schema=e2e
      JWT_SECRET: test-jwt-secret
      CORS_ORIGIN: http://127.0.0.1:4173,http://localhost:4173,http://127.0.0.1:4273,http://localhost:4273
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prepare backend test env
        run: cp apps/backend/.env.test.example apps/backend/.env.test

      - name: Run frontend unit tests
        run: npm run test:frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/frontend

      - name: Run frontend E2E tests
        run: npm run test:e2e

      - name: Re-run critical E2E flows for stability
        run: npm --prefix apps/frontend run test:e2e -- --repeat-each=2 tests/dashboard_flows.spec.ts tests/login.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report
          if-no-files-found: ignore

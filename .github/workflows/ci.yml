name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "package.json"
      - "package-lock.json"
      - "vercel.json"
      - ".github/workflows/ci.yml"
      - ".github/workflows/playwright.yml"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "package.json"
      - "package-lock.json"
      - "vercel.json"
      - ".github/workflows/ci.yml"
      - ".github/workflows/playwright.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Setup backend env
        run: npm run setup:env
      - name: Security audit
        run: npm audit --audit-level=high || true
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build

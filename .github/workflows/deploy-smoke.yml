name: Deploy Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
      SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
      SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}

    steps:
      - name: Check required secrets and URLs
        run: |
          test -n "$FRONTEND_URL"
          test -n "$API_HEALTH_URL"
          test -n "$SMOKE_ADMIN_EMAIL"
          test -n "$SMOKE_ADMIN_PASSWORD"

      - name: Smoke frontend
        run: curl --fail --silent --show-error "$FRONTEND_URL" > /dev/null

      - name: Smoke frontend API rewrite
        run: curl --fail --silent --show-error "${FRONTEND_URL%/}/api/health" > /dev/null

      - name: Smoke API health
        run: curl --fail --silent --show-error "$API_HEALTH_URL" > /dev/null

      - name: Smoke login via frontend rewrite
        run: |
          response=$(curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$SMOKE_ADMIN_EMAIL\",\"password\":\"$SMOKE_ADMIN_PASSWORD\"}" \
            "${FRONTEND_URL%/}/api/auth/login")
          printf '%s' "$response" | grep -q '"user"'

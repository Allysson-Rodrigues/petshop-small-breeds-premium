name: Task Request
description: Track a non-feature implementation or maintenance task.
title: "[Task]: "
labels:
  - task
body:
  - type: textarea
    id: deliverable
    attributes:
      label: Deliverable
      description: Describe the concrete result expected from this task.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Which command, workflow, or smoke path proves completion?

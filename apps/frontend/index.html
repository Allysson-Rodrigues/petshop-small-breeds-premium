  <script>
    // UX Audit: Performance optimization (rAF)
    let isMoving = false;
    window.addEventListener('scroll', () => {
      if (!isMoving) {
        requestAnimationFrame(() => {
          // Optimized layout string
          isMoving = false;
        });
        isMoving = true;
      }
    }, { passive: true });
  </script>

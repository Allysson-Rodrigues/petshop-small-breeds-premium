services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petshop-backend-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - sqlite-data:/app/prisma

volumes:
  sqlite-data:
